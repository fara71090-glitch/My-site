<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxVocab Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 100%); color: white; font-family: sans-serif; min-h-screen }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen">
    <nav class="p-6 flex justify-between items-center glass m-4 rounded-2xl">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center font-bold text-white">B</div>
            <h1 class="text-xl font-bold italic">BloxVocab Academy</h1>
        </div>
        <button class="glass px-4 py-2 rounded-xl text-sm">Kazakhstan Edition 🇰🇿</button>
    </nav>
    <main class="container mx-auto px-4 py-12 flex flex-col items-center text-center">
        <div class="bg-blue-900/30 text-blue-300 px-4 py-1 rounded-full text-sm mb-6 border border-blue-500/30">Платформа для обучения английскому</div>
        <h2 class="text-5xl md:text-7xl font-black mb-6 tracking-tight">Master <span class="text-blue-400">Roblox</span> English</h2>
        <p class="text-gray-400 text-lg max-w-xl mb-10 leading-relaxed">Изучай английский язык через термины и ситуации из любимой игры. Твой путь к высокому уровню начинается здесь!</p>
        <div class="flex flex-col md:flex-row gap-4">
            <button class="bg-blue-500 hover:bg-blue-400 px-8 py-4 rounded-xl font-bold text-white transition transform hover:scale-105">Начать обучение</button>
            <button class="glass px-8 py-4 rounded-xl font-bold hover:bg-white/10 transition">Открыть словарь</button>
        </div>
        <div class="mt-20 grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl">
            <div class="glass p-6 rounded-3xl text-left"><div class="text-blue-400 mb-2">Уровень</div><div class="text-2xl font-bold uppercase">Beginner A2</div></div>
            <div class="glass p-6 rounded-3xl text-left"><div class="text-blue-400 mb-2">Прогресс</div><div class="text-2xl font-bold uppercase">600 XP</div></div>
            <div class="glass p-6 rounded-3xl text-left"><div class="text-blue-400 mb-2">Статус</div><div class="text-2xl font-bold uppercase">Active</div></div>
        </div>
    </main>
</body>
</html>
